name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  server:
    name: Go server (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.mod

      - name: Test
        working-directory: server
        run: go test ./...

      - name: Build
        working-directory: server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o "dist/agent-light-server-${{ matrix.target }}" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-light-server-${{ matrix.target }}
          path: server/dist/agent-light-server-${{ matrix.target }}

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
