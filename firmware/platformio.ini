; PlatformIO 配置 —— ESP32-C3 SuperMini (esp32-c3-devkitm-1)
; 烧录：pio run -t upload    串口日志：pio device monitor

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
  bblanchon/ArduinoJson@^7

build_flags =
  ; SuperMini 的 USB 是 USB-Serial-JTAG，开启后 Serial 日志走 USB，插同一根线就能看
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
