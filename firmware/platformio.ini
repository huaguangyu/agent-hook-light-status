; Agent Light 固件 PlatformIO 配置
;
; 开发板切换放在这里，用 PlatformIO 的 env 选择：
;
;   pio run -e esp32-c3 -t upload
;   pio run -e esp32-c3 -t monitor
;
;   pio run -e esp32-wroom32e -t upload
;   pio run -e esp32-wroom32e -t monitor
;
; 灯板类型不要在这里切，去 src/main.cpp 顶部改 LIGHT_PRESET。
; 这样同一块 ESP32 开发板可以反复试 8x8、12环、4x4、2x2、6灯条等不同灯板。

[platformio]
default_envs = esp32-c3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

lib_deps =
  bblanchon/ArduinoJson@^7
  fastled/FastLED

build_flags =
  -DCORE_DEBUG_LEVEL=0

[env:esp32-c3]
board = esp32-c3-devkitm-1
build_flags =
  ${env.build_flags}
  ; ESP32-C3 默认用 GPIO8 接 WS2812 的 DIN 数据脚。
  ; 如果你的 C3 板子 GPIO8 不方便，比如被板载灯或启动功能占用，就改成 GPIO4。
  -DDEFAULT_LED_PIN=8
  ; 配网按键。很多 ESP32-C3 开发板 BOOT 键是 GPIO9。
  ; 注意：如果按住 BOOT 再复位导致进入下载模式，就换一个普通 GPIO 外接按钮到 GND。
  -DDEFAULT_CFG_BUTTON_PIN=9
  ; C3 常见开发板支持 USB-Serial-JTAG。打开后，烧录和串口日志可以走同一根 USB 线。
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-wroom32e]
; ESP32-WROOM-32E 开发板通常用 esp32dev 这个通用目标。
board = esp32dev
build_flags =
  ${env.build_flags}
  ; WROOM32E 默认用 GPIO4 接 WS2812 的 DIN 数据脚。
  ; 尽量避开 GPIO0/2/12/15 这类启动绑带脚，除非你确认板子接线没有影响启动。
  -DDEFAULT_LED_PIN=4
  ; 很多 ESP32-WROOM-32E 开发板 BOOT 键是 GPIO0。
  ; 如果按住 BOOT 开机进了下载模式，请外接一个按钮到普通 GPIO，并改这里。
  -DDEFAULT_CFG_BUTTON_PIN=0
